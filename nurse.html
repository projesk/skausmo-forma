<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Slaugytojų langas – Postas 1</title>

<style>
:root{
  --bg:#f3f4f6;
  --card:#fff;
  --text:#111827;
  --muted:#6b7280;
  --border:#111;
  --soft:#e5e7eb;
  --primary:#663399;
  --danger:#b00020;
  --dangerBg:#fff6f7;
  --ok:#166534;
  --okBg:#ecfdf5;
  --pendingBorder:#e7c66b;
  --doneBorder:#86d3a4;
  --shadow:0 1px 6px rgba(0,0,0,.05);
  --shadowHover:0 4px 12px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header{
  position:sticky;
  top:0;
  z-index:10;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(6px);
  border-bottom:1px solid var(--soft);
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.title{font-weight:900;font-size:15px}
.meta{font-size:11px;color:var(--muted)}
.actions{display:flex;gap:8px;align-items:center}

.btn{
  border:0;
  border-radius:12px;
  padding:.45rem .85rem;
  font-size:12px;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
  font-weight:800;
  user-select:none;
}
.btn.secondary{
  background:#f9fafb;
  color:var(--text);
  border:1px solid var(--soft);
}

.container{padding:12px}

.wards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  align-items:start;
}

.col{
  display:flex;
  flex-direction:column;
  gap:12px;
  align-items:stretch;
}

@media (max-width: 980px){
  .wards{grid-template-columns:1fr}
}

.ward{
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:16px;
  padding:10px;
  box-shadow:var(--shadow);
}

.wardHeaderRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  gap:8px;
}

.wardHeader{
  border:1.5px solid var(--border);
  padding:4px 10px;
  font-weight:900;
  border-radius:10px;
  font-size:13px;
  white-space:nowrap;
}

.wardSub{
  font-size:11px;
  color:var(--muted);
  text-align:right;
  white-space:nowrap;
  line-height:1.2;
}

.ward.allergy{
  border-color:var(--danger);
  background:var(--dangerBg);
  box-shadow:0 0 0 2px rgba(176,0,32,.08), var(--shadow);
}
.ward.allergy .wardHeader{
  border-color:var(--danger);
  color:var(--danger);
}

.beds{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.bedCard{
  border:1.5px solid var(--border);
  border-radius:13px;
  padding:7px 9px;
  background:#fff;
  transition:.12s ease;
}
.bedCard:hover{
  transform:translateY(-1px);
  box-shadow:var(--shadowHover);
}

.bedCard.pending{
  background:linear-gradient(0deg, rgba(255,248,220,.95), rgba(255,248,220,.95)), #fff;
  border-color:var(--pendingBorder);
}

.bedCard.done{
  background:linear-gradient(0deg, rgba(236,253,245,.92), rgba(236,253,245,.92)), #fff;
  border-color:var(--doneBorder);
}

.bedTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.bedTitleWrap{
  display:flex;
  align-items:center;
  gap:6px;
  min-width:0;
}

.bedTitle{
  font-weight:900;
  font-size:15px;
  line-height:1.1;
}

.historyToggle{
  border:1px solid var(--soft);
  background:#f9fafb;
  border-radius:8px;
  padding:3px 7px;
  cursor:pointer;
  font-weight:800;
  font-size:10px;
  color:var(--text);
  user-select:none;
  line-height:1;
}
.historyToggle:hover{background:#f3f4f6}

.bedActions{
  display:flex;
  align-items:center;
  gap:5px;
  flex-shrink:0;
}

.doneBtn{
  border:1px solid #86d3a4;
  background:#ecfdf5;
  color:#166534;
  border-radius:9px;
  padding:4px 7px;
  cursor:pointer;
  font-weight:800;
  font-size:10px;
  user-select:none;
}
.doneBtn:hover{background:#dcfce7}
.doneBtn:disabled{
  opacity:.55;
  cursor:default;
}

.newBtn{
  border:1px solid var(--border);
  background:#fff;
  border-radius:9px;
  padding:4px 7px;
  cursor:pointer;
  font-weight:800;
  font-size:10px;
  user-select:none;
  flex-shrink:0;
}
.newBtn:hover{background:#f3f4f6}

.currentEval{
  margin-top:5px;
  padding:7px 8px;
  border:1px solid var(--soft);
  border-radius:11px;
  background:#fcfcfd;
}

.currentRow,
.historyRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.currentMain{
  font-size:14px;
  font-weight:800;
  line-height:1.1;
}

.currentMeta,
.historyMeta,
.historyLabel{
  font-size:11px;
  color:var(--muted);
}

.evalStatus{
  font-size:9px;
  padding:3px 6px;
  border-radius:999px;
  border:1px solid #d1d5db;
  background:#f9fafb;
  font-weight:900;
  white-space:nowrap;
}
.evalStatus.done{
  border-color:#bbf7d0;
  background:var(--okBg);
  color:var(--ok);
}
.evalStatus.pending{
  border-color:#f1b5c0;
  background:#fff7ed;
  color:#9a3412;
}

.historyPanel{
  margin-top:6px;
  padding-top:6px;
  border-top:1px dashed var(--soft);
}

.historyList{
  display:flex;
  flex-direction:column;
  gap:5px;
  margin-top:6px;
}

.historyItem{
  border:1px solid var(--soft);
  border-radius:10px;
  padding:6px 8px;
  background:#fff;
}

.tags{
  display:flex;
  gap:5px;
  margin-top:6px;
  flex-wrap:wrap;
}

.tag{
  font-size:9px;
  padding:2px 6px;
  border-radius:999px;
  border:1px solid #d1d5db;
  background:#f9fafb;
  font-weight:900;
}
.tag.red{border-color:#f1b5c0;background:#ffeef1;color:#9f1239}
.tag.green{border-color:#bbf7d0;background:var(--okBg);color:var(--ok)}
</style>
</head>

<body>
<header>
  <div>
    <div class="title">Slaugytojų langas – Postas 1</div>
    <div class="meta" id="meta">–</div>
  </div>

  <div class="actions">
    <button class="btn secondary" id="soundBtn">Įjungti garsą</button>
    <button class="btn" id="refreshBtn">Atnaujinti</button>
  </div>
</header>

<div class="container">
  <div class="wards">
    <div class="col" id="colL"></div>
    <div class="col" id="colR"></div>
  </div>
</div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbw4cdh6miY0FPdhHUaR8CxaRNarh01J1rY_QhCN7A5TTvyDgcDED57jZOBGk0g-m05b_A/exec";
const POST="1";
const REFRESH_SEC=10;
const WARD_ORDER = ["34","38","40","36","44","37","45","12"];

let audioEnabled=false;
let audioCtx=null;

function beep(){
  if(!audioEnabled) return;
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.frequency.value=880;
    g.gain.value=0.06;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    setTimeout(()=>o.stop(),160);
  }catch(e){}
}

document.getElementById("soundBtn").addEventListener("click", async ()=>{
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    await audioCtx.resume();
    audioEnabled=true;
    const btn=document.getElementById("soundBtn");
    btn.textContent="Garsas įjungtas";
    btn.disabled=true;
    beep();
  }catch(e){
    alert("Nepavyko įjungti garso.");
  }
});

document.getElementById("refreshBtn").addEventListener("click", ()=>load());

async function api(params){
  const url = SCRIPT_URL + "?" + new URLSearchParams(params);
  const res = await fetch(url);
  return await res.json();
}

function fmtTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return String(iso);
  return d.toLocaleTimeString("lt-LT",{hour:"2-digit",minute:"2-digit"});
}

function groupByWard(items){
  const map=new Map();
  for(const b of items){
    const w=String(b.ward || "");
    if(!map.has(w)) map.set(w, []);
    map.get(w).push(b);
  }
  return map;
}

function bedSortKey(b){
  const raw = b.bedNo ? String(b.bedNo) : String(b.bed || "").split("-")[1];
  const bn = parseInt(raw,10);
  if (bn === 12) return 9999999;
  return Number.isFinite(bn) ? bn : 999999;
}

function escapeJs(s){
  return String(s).replaceAll("\\","\\\\").replaceAll("'","\\'");
}

function getPainValue(obj){
  const val =
    obj?.pain ??
    obj?.lastPain ??
    obj?.score ??
    obj?.painScore ??
    obj?.value ??
    obj?.rating ??
    null;

  return (val === 0 || val) ? val : null;
}

function getTimeValue(obj){
  return (
    obj?.time ??
    obj?.lastTime ??
    obj?.timestamp ??
    obj?.createdAt ??
    obj?.date ??
    null
  );
}

function normalizeHistory(hist){
  const list = Array.isArray(hist) ? [...hist] : [];
  return list
    .map(entry => ({
      ...entry,
      pain: getPainValue(entry),
      time: getTimeValue(entry)
    }))
    .filter(entry => entry.pain !== null)
    .sort((a,b)=>{
      const ta = new Date(a?.time || 0).getTime();
      const tb = new Date(b?.time || 0).getTime();
      return tb - ta;
    });
}

function buildEvaluations(b){
  const history = normalizeHistory(b.history);
  const currentPain = getPainValue(b);
  const currentTime = getTimeValue(b);
  const merged = [];

  if(currentPain !== null){
    merged.push({
      pain: currentPain,
      time: currentTime,
      status: b.status
    });
  }

  for(const item of history){
    merged.push(item);
  }

  const seen = new Set();

  return merged
    .filter(item => getPainValue(item) !== null)
    .sort((a,b)=>{
      const ta = new Date(getTimeValue(a) || 0).getTime();
      const tb = new Date(getTimeValue(b) || 0).getTime();
      return tb - ta;
    })
    .filter(item => {
      const key = `${getPainValue(item)}|${getTimeValue(item) || ""}`;
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function resolveEvalStatus(entry, fallbackStatus){
  const raw = String(entry?.status || entry?.execution || entry?.done || fallbackStatus || "").toUpperCase();
  if(raw === "DONE" || raw === "ATLIKTA" || raw === "YES" || raw === "TRUE"){
    return { label:"Atlikta", cls:"done" };
  }
  return { label:"Neatlikta", cls:"pending" };
}

function renderEvalLine(entry, fallbackStatus){
  const pain = getPainValue(entry) ?? "–";
  const time = fmtTime(getTimeValue(entry));
  const status = resolveEvalStatus(entry, fallbackStatus);

  return `
    <div class="historyItem">
      <div class="historyRow">
        <div>
          <div><b>${pain}/10</b></div>
          <div class="historyMeta">${time || "Laikas nenurodytas"}</div>
        </div>
        <span class="evalStatus ${status.cls}">${status.label}</span>
      </div>
    </div>
  `;
}

async function newPatient(token){
  if(!token) return;
  if(!confirm("Pradėti naują pacientą?")) return;
  await api({action:"clearBedFull", id:token});
  await load();
}
window.newPatient = newPatient;

async function markDone(token){
  if(!token) return;
  await api({action:"markDone", id:token});
  await load();
}
window.markDone = markDone;

function toggleHistory(id){
  const panel = document.getElementById(id);
  const btn = document.querySelector(`[data-history-btn="${id}"]`);
  if(!panel || !btn) return;

  const isHidden = panel.hidden;
  panel.hidden = !isHidden;
  btn.textContent = isHidden ? "Slėpti" : "Istorija";
  btn.setAttribute("aria-expanded", String(isHidden));
}
window.toggleHistory = toggleHistory;

function renderWardHtml(ward, beds){
  const wardHasAllergy = beds.some(b => String(b.allergy).toUpperCase() === "YES");
  const sortedBeds = [...beds].sort((a,b)=>bedSortKey(a)-bedSortKey(b));
  const doneCount = sortedBeds.filter(b => String(b.status).toUpperCase() === "DONE").length;

  return `
    <section class="ward ${wardHasAllergy ? "allergy" : ""}">
      <div class="wardHeaderRow">
        <div class="wardHeader">${ward} palata ${wardHasAllergy ? "— ALERGIJA" : ""}</div>
        <div class="wardSub">
          Lovų: <b>${sortedBeds.length}</b><br>
          Atlikta: <b>${doneCount}</b>
        </div>
      </div>

      <div class="beds">
        ${sortedBeds.map(renderBedCardHtml).join("")}
      </div>
    </section>
  `;
}

function renderBedCardHtml(b){
  const bedNo = b.bedNo ? String(b.bedNo) : (String(b.bed || "").split("-")[1] || "");
  const evals = buildEvaluations(b);
  const mainEval = evals[0] || null;
  const older = evals.slice(1,6);

  const allergyYes = String(b.allergy).toUpperCase() === "YES";
  const isDone = String(b.status).toUpperCase() === "DONE";
  const hasEvaluation = getPainValue(mainEval) !== null;
  const hasOlderHistory = older.length > 0;

  const cardStateClass = !hasEvaluation ? "" : (isDone ? "done" : "pending");

  const historyId = `hist_${String(b.token || `${b.ward}_${bedNo}`).replace(/[^a-zA-Z0-9_-]/g, "_")}`;
  const mainStatus = resolveEvalStatus(mainEval, b.status);

  return `
    <article class="bedCard ${cardStateClass}">
      <div class="bedTop">
        <div class="bedTitleWrap">
          <div class="bedTitle">${bedNo} lova</div>
          ${hasOlderHistory ? `
            <button
              class="historyToggle"
              type="button"
              data-history-btn="${historyId}"
              onclick="toggleHistory('${escapeJs(historyId)}')"
              aria-expanded="false"
            >Istorija</button>
          ` : ``}
        </div>

        <div class="bedActions">
          <button
            class="doneBtn"
            onclick="markDone('${escapeJs(b.token || "")}')"
            ${isDone || !hasEvaluation ? "disabled" : ""}
          >Atlikta</button>

          <button
            class="newBtn"
            onclick="newPatient('${escapeJs(b.token || "")}')"
          >Naujas pacientas</button>
        </div>
      </div>

      <div class="currentEval">
        ${mainEval ? `
          <div class="currentRow">
            <div class="currentMain">${getPainValue(mainEval) ?? "–"}/10</div>
            <span class="evalStatus ${mainStatus.cls}">${mainStatus.label}</span>
          </div>
          <div class="currentMeta">${fmtTime(getTimeValue(mainEval)) || "Laikas nenurodytas"}</div>
        ` : `
          <div class="currentMain">Nėra vertinimo</div>
        `}

        ${hasOlderHistory ? `
          <div class="historyPanel" id="${historyId}" hidden>
            <div class="historyLabel">Paskutiniai 5 senesni vertinimai</div>
            <div class="historyList">
              ${older.map(h => renderEvalLine(h, b.status)).join("")}
            </div>
          </div>
        ` : ``}
      </div>

      <div class="tags">
        ${allergyYes ? `<span class="tag red">ALERGIJA</span>` : ``}
        ${isDone && hasEvaluation ? `<span class="tag green">ATLIKTA</span>` : ``}
      </div>
    </article>
  `;
}

const LS_KEY = "post1_seen_lastTime";
let seen = {};
try{
  seen = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
}catch(e){
  seen = {};
}
let firstLoad = true;

function numericWardSort(a,b){
  const na = parseInt(a,10), nb = parseInt(b,10);
  if(Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
  return String(a).localeCompare(String(b));
}

function makeElFromHtml(html){
  const wrap = document.createElement("div");
  wrap.innerHTML = html.trim();
  return wrap.firstElementChild;
}

function masonryPlace(wardEls){
  const colL = document.getElementById("colL");
  const colR = document.getElementById("colR");
  colL.innerHTML = "";
  colR.innerHTML = "";

  const oneColumn = window.matchMedia("(max-width: 980px)").matches;

  let hL = 0, hR = 0;
  for(const el of wardEls){
    if(oneColumn){
      colL.appendChild(el);
      continue;
    }
    if(hL <= hR){
      colL.appendChild(el);
      hL += el.getBoundingClientRect().height + 12;
    }else{
      colR.appendChild(el);
      hR += el.getBoundingClientRect().height + 12;
    }
  }
}

async function load(){
  const data = await api({action:"getPostBoard", post:POST});
  if(!data || data.ok !== true) return;

  const beds = data.beds || [];

  let newEntry = false;
  const nextSeen = {...seen};

  for(const b of beds){
    const t = String(b.token || "");
    const lt = String(b.lastTime || "");
    if(!t || !lt) continue;

    const prev = String(seen[t] || "");
    if(!firstLoad && prev && lt !== prev) newEntry = true;
    nextSeen[t] = lt;
  }

  firstLoad = false;
  seen = nextSeen;

  try{
    localStorage.setItem(LS_KEY, JSON.stringify(seen));
  }catch(e){}

  if(newEntry) beep();

  const grouped = groupByWard(beds);
  const allWards = [...grouped.keys()];
  const ordered = [];
  const used = new Set();

  for(const w of WARD_ORDER){
    ordered.push(String(w));
    used.add(String(w));
  }

  const rest = allWards.filter(w => !used.has(String(w))).sort(numericWardSort);
  const finalWardList = [...ordered, ...rest];

  const wardEls = finalWardList.map(ward=>{
    const list = grouped.get(String(ward)) || [];
    return makeElFromHtml(renderWardHtml(String(ward), list));
  });

  masonryPlace(wardEls);

  document.getElementById("meta").textContent =
    `Atnaujinama kas ${REFRESH_SEC}s • ` +
    new Date().toLocaleTimeString("lt-LT",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

load();
setInterval(load, REFRESH_SEC * 1000);

window.addEventListener("resize", ()=>{
  clearTimeout(window.__masonryT);
  window.__masonryT = setTimeout(load, 120);
});
</script>
</body>
</html>
